{% extends 'base.html' %} 

{% block content %}

<div class="login-wrapper">

    <!-- div de login -->
    <div class="login-card">
        <h1>Iniciar Sesión</h1>
        
        <!-- Formulario que envía los datos -->
        <form method="POST" action="{{ url_for('login') }}">
            
            <!--email -->
            <label for="email">Correo Electrónico</label>
            <input type="email" name="email" id="email" required placeholder="tu@email.com">
            
            <!--contraseña -->
            <label for="password">Contraseña</label>
            <input type="password" name="password" id="password" required>
            
            <!-- Botn envio -->
            <button type="submit">Entrar</button>
        </form>

        <!-- Bloque para mostrar mensajes flash (errores o avisos) -->
        {% with mensajes = get_flashed_messages() %}
            {% if mensajes %}
                <div class="flash-messages">
                    {% for mensaje in mensajes %}
                        <!-- Se muestra cada mensaje -->
                        <p>{{ mensaje }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Enlace para registrarse -->
        <div class="login-footer">
            <p>¿No tienes cuenta?</p>
            <a href="{{ url_for('registro') }}">Regístrate aquí</a>
        </div>

    </div>
</div>

{% endblock %}
