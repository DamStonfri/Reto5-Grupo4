{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 30px auto;">

    <!-- Título de la página -->
    <h1>Crear Menú del Día</h1>

    <!-- Formulario que envía los datos a 'nuevo_menu' -->
    <form action="{{ url_for('nuevo_menu') }}" method="POST">

        <!-- nombre del menú -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Nombre del menú</label>
            <input type="text" name="nombre" required placeholder="Ej: Menú del lunes"
                    style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        </div>

        <!-- día de la semana -->
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Día de la semana</label>
            <!-- Selector con los días -->
            <select name="dia_semana" required
                    style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <option value="lunes">Lunes</option>
                <option value="martes">Martes</option>
                <option value="miercoles">Miércoles</option>
                <option value="jueves">Jueves</option>
                <option value="viernes">Viernes</option>
                <option value="sabado">Sábado</option>
                <option value="domingo">Domingo</option>
            </select>
        </div>

        <!-- Sección para seleccionar recetas -->
        <h3>Selecciona recetas de los usuarios</h3>

        <!-- Contenedor de recetas -->
        <div style="display: grid; gap: 12px; margin-bottom: 25px;">

            {% for receta in recetas %}
                <!-- Cada receta es un checkbox seleccionable -->
                <label style="display: flex; align-items: center; gap: 12px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; cursor: pointer;">

                    <!-- Checkbox que envía los IDs de las recetas -->
                    <input type="checkbox" name="recetas[]" value="{{ receta.id }}">

                    <!-- Imagen de la receta -->
                    {% if receta.imagen %}
                        <img src="{{ url_for('static', filename='uploads/' ~ receta.imagen) }}"
                                style="width: 70px; height: 55px; object-fit: cover; border-radius: 6px;">
                    {% else %}
                        <!-- Imagen por defecto -->
                        <div style="width: 70px; height: 55px; background: #444; border-radius: 6px; display: flex; align-items: center; justify-content: center;">
                            🍽️
                        </div>
                    {% endif %}

                    <!-- Información de la receta -->
                    <span>
                        <strong>{{ receta.titulo }}</strong><br>
                        <small>por {{ receta.autor }}</small>
                    </span>

                </label>

            {% else %}
                <!-- Mensaje si no hay recetas -->
                <p>No hay recetas disponibles. Primero crea una receta.</p>
            {% endfor %}
        </div>

        <!-- Botón para guardar el menú -->
        <button type="submit"
                style="width: 100%; padding: 14px; background: #111; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">
            Guardar menú
        </button>

    </form>

</div>
{% endblock %}
