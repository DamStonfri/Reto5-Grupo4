<!-- parte aimar -->
{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Iniciar Sesion</h1>
        <p class="auth-subtitle">Bienvenido de nuevo</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label" for="email">Correo Electronico</label>
                <input class="form-control" type="email" name="email" id="email" required placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Contrasena</label>
                <input class="form-control" type="password" name="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-dark btn-full">Entrar</button>
        </form>

        <!-- Mensajes de error del servidor -->
        {% with mensajes = get_flashed_messages() %}
            {% if mensajes %}
                <div class="flash-messages">
                    {% for mensaje in mensajes %}
                        <p class="flash-msg flash-msg--error">{{ mensaje }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="auth-footer">
            <p>No tienes cuenta?</p>
            <a href="{{ url_for('registro') }}">Registrate aqui</a>
        </div>
    </div>
</div>
{% endblock %}
