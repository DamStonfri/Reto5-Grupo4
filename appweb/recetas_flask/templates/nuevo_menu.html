{% extends 'base.html' %}

{% block content %}
<div class="page-wrapper--narrow">
    <div class="card">
        <h1 class="page-title" style="margin-bottom: 28px;">Crear Menu del Dia</h1>

        <form action="{{ url_for('nuevo_menu') }}" method="POST">

            <div class="form-group">
                <label class="form-label">Nombre del menu</label>
                <input class="form-control" type="text" name="nombre" required placeholder="Ej: Menu del lunes">
            </div>

            <div class="form-group">
                <label class="form-label">Dia de la semana</label>
                <select class="form-control" name="dia_semana" required>
                    <option value="lunes">Lunes</option>
                    <option value="martes">Martes</option>
                    <option value="miercoles">Miercoles</option>
                    <option value="jueves">Jueves</option>
                    <option value="viernes">Viernes</option>
                    <option value="sabado">Sabado</option>
                    <option value="domingo">Domingo</option>
                </select>
            </div>

            <hr class="form-divider">

            <!-- Lista de recetas disponibles para incluir en el menu -->
            <h3 class="form-section-title">Selecciona recetas</h3>
            <div style="display:grid; gap:10px; margin-bottom:24px;">
                {% for receta in recetas %}
                <label class="recipe-checkbox-label">
                    <input type="checkbox" name="recetas[]" value="{{ receta.id }}">
                    {% if receta.imagen %}
                        <img src="{{ url_for('static', filename='uploads/' ~ receta.imagen) }}"
                                style="width:64px; height:50px; object-fit:cover; border-radius:6px; flex-shrink:0;">
                    {% else %}
                        <div style="width:64px; height:50px; background:#444; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.8rem; color:#fff; flex-shrink:0;">sin img</div>
                    {% endif %}
                    <span>
                        <strong>{{ receta.titulo }}</strong><br>
                        <small style="color:var(--ink-light);">por {{ receta.autor }}</small>
                    </span>
                </label>
                {% else %}
                <p style="color:var(--ink-light);">No hay recetas disponibles. Primero crea una receta.</p>
                {% endfor %}
            </div>

            <button type="submit" class="btn btn-dark btn-full">Guardar menu</button>
        </form>
    </div>
</div>
{% endblock %}
